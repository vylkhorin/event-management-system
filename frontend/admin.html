<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Admin Dashboard • EMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --secondary-gradient: linear-gradient(135deg, #b486b9 0%, #bb9399 100%);
      --success-gradient: linear-gradient(135deg, #4facfe 0%, #405a5c 100%);
      --danger-gradient: linear-gradient(135deg, #93717c 0%, #42656d 100%);
      --dark-gradient: linear-gradient(135deg, #434343 0%, #000000 100%);
      --card-bg: rgba(255, 255, 255, 0.1);
      --text-primary: #ffffff;
      --text-secondary: #e0e0e0;
      --border-color: rgba(255, 255, 255, 0.18);
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(120deg, #1a1a2e, #16213e, #0f3460);
      color: var(--text-secondary);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      text-align: center;
    }
    
    /* Animated background */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(120, 119, 198, 0.3) 0%, transparent 20%),
        radial-gradient(circle at 90% 80%, rgba(255, 119, 198, 0.3) 0%, transparent 20%),
        radial-gradient(circle at 50% 50%, rgba(120, 219, 255, 0.2) 0%, transparent 30%);
      z-index: -1;
      animation: backgroundAnimation 20s ease infinite;
    }
    
    @keyframes backgroundAnimation {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    
    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 30px;
      background: rgba(26, 26, 46, 0.7);
      border-bottom: 1px solid var(--border-color);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .logo {
      font-size: 1.6rem;
      font-weight: 700;
      background: var(--primary-gradient);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .logo .material-icons {
      font-size: 1.8rem;
      -webkit-text-fill-color: #667eea;
    }
    
    /* Header actions */
    .header-actions {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    #reportSummary {
      padding: 8px 16px;
      background: var(--card-bg);
      border-radius: 30px;
      border: 1px solid var(--border-color);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    /* Buttons */
    button {
      appearance: none;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      margin: 0 auto;
    }
    
    button.primary {
      background: var(--primary-gradient);
      color: white;
    }
    
    button.secondary {
      background: var(--success-gradient);
      color: white;
    }
    
    button.danger {
      background: var(--danger-gradient);
      color: white;
    }
    
    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
    }
    
    button:active {
      transform: translateY(1px);
    }
    
    /* Main container */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    
    /* Section headings */
    h2 {
      text-align: center;
      margin: 40px 0 30px;
      font-size: 2.2rem;
      color: var(--text-primary);
      font-weight: 700;
      position: relative;
      display: inline-block;
      width: 100%;
    }
    
    h2::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 4px;
      background: var(--primary-gradient);
      border-radius: 2px;
    }
    
    /* Form card */
    .form-card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 30px;
      width: 100%;
      max-width: 700px;
      margin: 0 auto 50px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(15px) saturate(150%);
      -webkit-backdrop-filter: blur(15px) saturate(150%);
      transition: all 0.3s ease;
      text-align: center;
    }
    
    .form-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    
    /* Form rows - now single column */
    .form-field {
      margin-bottom: 20px;
      width: 100%;
      text-align: center;
    }
    
    /* Form inputs */
    input, textarea {
      padding: 14px 18px;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-secondary);
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
      width: 100%;
      text-align: center;
    }
    
    input:focus, textarea:focus {
      outline: none;
      border-color: rgba(102, 126, 234, 0.5);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }
    
    input::placeholder, textarea::placeholder {
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
    }
    
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    /* Form actions */
    .form-actions {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 25px;
      flex-wrap: wrap;
    }
    
    /* Grid layout */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
      width: 100%;
      margin-bottom: 60px;
      justify-items: center;
    }
    
    /* Cards */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(15px) saturate(150%);
      -webkit-backdrop-filter: blur(15px) saturate(150%);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      text-align: center;
      width: 100%;
    }
    
    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: var(--primary-gradient);
    }
    
    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }
    
    .card-title {
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    
    .card-info {
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .card-info .material-icons {
      font-size: 1.1rem;
      color: #667eea;
    }
    
    .card-description {
      margin-top: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    
    .card-actions {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    
    .card-actions button {
      padding: 8px 15px;
      font-size: 0.85rem;
    }
    
    /* Hint text */
    .small {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 15px;
      text-align: center;
      opacity: 0.8;
    }
    
    /* Responsive design */
    @media(max-width: 768px) {
      .form-field {
        margin-bottom: 15px;
      }
      
      .form-card {
        padding: 20px;
      }
      
      h2 {
        font-size: 1.8rem;
      }
      
      .grid {
        grid-template-columns: 1fr;
      }
    }
    
    /* Loading animation */
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: #667eea;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <i class="material-icons">dashboard</i>
      Admin Dashboard
    </div>
    <div class="header-actions">
      <div id="reportSummary">
        <i class="material-icons">assessment</i>
        <span>Loading reports…</span>
      </div>
      <button class="danger" onclick="logout()">
        <i class="material-icons">logout</i>
        Logout
      </button>
    </div>
  </header>
  
  <div class="container">
    <!-- Form -->
    <h2>Create / Edit Event</h2>
    <div class="form-card">
      <div class="form-field">
        <input id="evTitle" placeholder="Event Title"/>
      </div>
      <div class="form-field">
        <input id="evLocation" placeholder="Location"/>
      </div>
      <div class="form-field">
        <input id="evDate" type="datetime-local"/>
      </div>
      <div class="form-field">
        <input id="evTotal" type="number" placeholder="Total Seats"/>
      </div>
      <div class="form-field">
        <input id="evPrice" type="number" placeholder="Price"/>
      </div>
      <div class="form-field">
        <textarea id="evDesc" placeholder="Event Description"></textarea>
      </div>
      <div class="form-actions">
        <button class="primary" onclick="createOrUpdateEvent()" id="eventSubmitBtn">
          <i class="material-icons">save</i>
          Create Event
        </button>
        <button class="secondary" onclick="resetEventForm()">
          <i class="material-icons">clear</i>
          Clear Form
        </button>
      </div>
      <div class="small" id="editHint"></div>
    </div>
    
    <!-- Events & Bookings -->
    <h2>Events</h2>
    <div id="events" class="grid"></div>
    
    <h2>Bookings</h2>
    <div id="bookings" class="grid"></div>
  </div>
  
  <script src="js/main.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
