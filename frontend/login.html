<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Login • EventHub</title>
  <meta name="description" content="Login to your EventHub account"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="css/theme.css"/>
  <style>
    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .auth-box {
      width: 100%;
      max-width: 440px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 40px;
      box-shadow: var(--shadow-lg);
      animation: rise 0.5s ease;
    }
    @keyframes rise { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .auth-logo {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 32px;
      font-family: 'Sora',sans-serif; font-weight:700; font-size:1.2rem;
    }
    .auth-logo-icon {
      width:40px;height:40px;border-radius:var(--radius-sm);
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      display:flex;align-items:center;justify-content:center;
    }
    .auth-logo-icon .material-icons { color:white;font-size:22px; }
    .auth-title { font-size:1.5rem;font-weight:800;margin-bottom:6px; }
    .auth-sub { font-size:.9rem;color:var(--text-muted);margin-bottom:28px; }
    .auth-footer { text-align:center;margin-top:22px;font-size:.88rem;color:var(--text-muted); }
    .auth-footer a { color:var(--primary-light);font-weight:600; }
    .auth-footer a:hover { color:var(--primary); }
    /* Orbs */
    .orb { position:fixed;border-radius:50%;filter:blur(80px);opacity:0.1;pointer-events:none;z-index:-1; }
    .orb-1 { width:400px;height:400px;background:var(--primary);top:-150px;left:-150px; }
    .orb-2 { width:400px;height:400px;background:var(--secondary);bottom:-150px;right:-150px; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon"><span class="material-icons">event</span></div>
      EventHub
    </div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your account</p>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label">Email or Name</label>
        <div class="input-with-icon">
          <span class="material-icons">person</span>
          <input type="text" id="identifier" class="form-control" placeholder="you@example.com or John Doe" required autocomplete="username"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-with-icon">
          <span class="material-icons">lock</span>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password"/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem;margin-top:8px">
        <span class="material-icons">login</span> Login
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
