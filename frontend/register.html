<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Create Account • EventHub</title>
  <meta name="description" content="Create your EventHub account to start booking events"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="css/theme.css"/>
  <style>
    body { display:grid;place-items:center;min-height:100vh;padding:24px; }
    .auth-box {
      width:100%;max-width:460px;
      background:var(--bg-surface);
      border:1px solid var(--border);
      border-radius:var(--radius-xl);
      padding:40px;
      box-shadow:var(--shadow-lg);
      animation:rise .5s ease;
    }
    @keyframes rise { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .auth-logo { display:flex;align-items:center;gap:10px;margin-bottom:28px;font-family:'Sora',sans-serif;font-weight:700;font-size:1.2rem; }
    .auth-logo-icon { width:40px;height:40px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center; }
    .auth-logo-icon .material-icons { color:white;font-size:22px; }
    .auth-title { font-size:1.5rem;font-weight:800;margin-bottom:6px; }
    .auth-sub { font-size:.9rem;color:var(--text-muted);margin-bottom:28px; }
    .auth-footer { text-align:center;margin-top:20px;font-size:.88rem;color:var(--text-muted); }
    .auth-footer a { color:var(--primary-light);font-weight:600; }
    .orb { position:fixed;border-radius:50%;filter:blur(80px);opacity:0.1;pointer-events:none;z-index:-1; }
    .orb-1 { width:400px;height:400px;background:var(--primary);top:-150px;right:-150px; }
    .orb-2 { width:400px;height:400px;background:var(--accent);bottom:-150px;left:-150px; }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon"><span class="material-icons">event</span></div>
      EventHub
    </div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-sub">Join thousands of event-goers</p>

    <form id="registerForm" autocomplete="on">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div class="input-with-icon">
          <span class="material-icons">person</span>
          <input type="text" id="regName" class="form-control" placeholder="Jane Doe" required autocomplete="name"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-with-icon">
          <span class="material-icons">mail</span>
          <input type="email" id="regEmail" class="form-control" placeholder="you@example.com" required autocomplete="email"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Account Role</label>
        <div class="input-with-icon">
          <span class="material-icons">badge</span>
          <select id="regRole" class="form-control" style="appearance: none; padding-right: 36px;">
            <option value="user">User (Book Events)</option>
            <option value="admin">Admin (Manage Events)</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-with-icon">
          <span class="material-icons">lock</span>
          <input type="password" id="regPassword" class="form-control" placeholder="Min. 6 characters" required autocomplete="new-password"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-with-icon">
          <span class="material-icons">lock_outline</span>
          <input type="password" id="regConfirm" class="form-control" placeholder="Re-enter password" required autocomplete="new-password"/>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:14px;font-size:1rem;margin-top:8px">
        <span class="material-icons">person_add</span> Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
